name: Auto Publish Theme

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

concurrency:
  group: auto-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        run: npm version patch -m "chore(release): %s [skip ci]"

      - name: Build artifacts
        run: npm run build

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish -p "$VSCE_PAT"

      - name: Publish to Open VSX
        if: ${{ secrets.OPEN_VSX_TOKEN != '' }}
        env:
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
        run: npx ovsx publish -p "$OPEN_VSX_TOKEN"

      - name: Push version commit and tag
        run: git push --follow-tags
