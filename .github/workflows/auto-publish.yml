name: Auto Publish Theme

on:
  push:
    branches:
      - "**"

permissions:
  contents: write

concurrency:
  group: auto-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: npm version patch --no-git-tag-version

      - name: Resolve version and vsix filename
        run: |
          VERSION="$(node -e "console.log(require('./package.json').version)")"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "VSIX_FILE=lumberjack-theme-$VERSION.vsix" >> "$GITHUB_ENV"

      - name: Generate release note
        run: npm run release:auto-note -- "$VERSION"

      - name: Commit release files and create tag
        run: |
          git add package.json package-lock.json "releases/$VERSION.md"
          git commit -m "chore(release): v$VERSION [skip ci]"
          git tag "v$VERSION"

      - name: Typecheck and build
        run: |
          npm run typecheck
          npm run build
          npm run validate:engine

      - name: Package VSIX
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.VSIX_FILE }}
          path: ${{ env.VSIX_FILE }}
          if-no-files-found: error

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::error::Missing VSCE_PAT secret. Add it in GitHub repo Settings > Secrets and variables > Actions."
            exit 1
          fi
          npx vsce publish --packagePath "$VSIX_FILE" -p "$VSCE_PAT"

      - name: Publish to Open VSX (optional)
        env:
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
        run: |
          if [ -n "$OPEN_VSX_TOKEN" ]; then
            npx ovsx publish "$VSIX_FILE" -p "$OPEN_VSX_TOKEN"
          else
            echo "OPEN_VSX_TOKEN not set; skipping Open VSX publish."
          fi

      - name: Push release commit and tag
        run: git push origin "HEAD:${{ github.ref_name }}" --follow-tags
