name: Auto Publish Theme

on:
  push:
    branches:
      - "**"

permissions:
  contents: write

concurrency:
  group: auto-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version (no commit/tag yet)
        run: npm version patch --no-git-tag-version

      - name: Resolve release version
        run: |
          VERSION="$(node -p 'require(\"./package.json\").version')"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "VSIX_FILE=lumberjack-theme-$VERSION.vsix" >> "$GITHUB_ENV"

      - name: Generate release note
        run: npm run release:auto-note -- "${{ env.VERSION }}"

      - name: Commit release files and tag
        run: |
          git add package.json package-lock.json "releases/${{ env.VERSION }}.md"
          git add CHANGELOG.md || true
          git commit -m "chore(release): v${{ env.VERSION }} [skip ci]"
          git tag "v${{ env.VERSION }}"

      - name: Typecheck and build
        run: |
          npm run typecheck
          npm run build
          npm run validate:engine

      - name: Package VSIX
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.VSIX_FILE }}
          path: ${{ env.VSIX_FILE }}
          if-no-files-found: error

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          test -n "$VSCE_PAT"
          npx vsce publish --packagePath "${{ env.VSIX_FILE }}" -p "$VSCE_PAT"

      - name: Publish to Open VSX
        if: ${{ secrets.OPEN_VSX_TOKEN != '' }}
        env:
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
        run: npx ovsx publish "${{ env.VSIX_FILE }}" -p "$OPEN_VSX_TOKEN"

      - name: Upload VSIX to GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release view "v${{ env.VERSION }}" >/dev/null 2>&1 || gh release create "v${{ env.VERSION }}" --title "v${{ env.VERSION }}" --notes "Automated release."
          gh release upload "v${{ env.VERSION }}" "${{ env.VSIX_FILE }}" --clobber

      - name: Push version commit and tag
        run: git push --follow-tags
