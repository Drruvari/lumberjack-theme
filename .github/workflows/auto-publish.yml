name: Auto Publish Theme

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.actor != 'github-actions[bot]' && (github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]'))
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate publish secrets
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
        run: |
          missing=0
          if [ -z "$VSCE_PAT" ]; then
            echo "::error::VSCE_PAT is not set. Add it in GitHub → Settings → Secrets → Actions."
            missing=1
          fi
          if [ -z "$OPEN_VSX_TOKEN" ]; then
            echo "::error::OPEN_VSX_TOKEN is not set. Add it in GitHub → Settings → Secrets → Actions."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: npm version patch --no-git-tag-version

      - name: Resolve version and VSIX filename
        run: |
          VERSION="$(node -e "console.log(require('./package.json').version)")"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "VSIX_FILE=lumberjack-theme-$VERSION.vsix" >> "$GITHUB_ENV"

      - name: Remove old VSIX files
        run: find . -maxdepth 1 -type f -name 'lumberjack-theme-*.vsix' -delete

      - name: Generate release note
        run: npm run release:auto-note -- "$VERSION"

      - name: Update CHANGELOG.md
        run: npm run release:changelog -- "$VERSION"

      - name: Typecheck and build
        run: |
          npm run typecheck
          npm run build
          npm run validate:engine
          npm run test:engine

      - name: Package VSIX
        run: |
          npx vsce package --out "$VSIX_FILE"
          count="$(find . -maxdepth 1 -type f -name 'lumberjack-theme-*.vsix' | wc -l | tr -d ' ')"
          if [ "$count" -ne 1 ]; then
            echo "::error::Expected exactly one VSIX after packaging, found $count."
            find . -maxdepth 1 -type f -name 'lumberjack-theme-*.vsix'
            exit 1
          fi

      - name: Commit release files
        run: |
          git add package.json package-lock.json CHANGELOG.md "releases/$VERSION.md" dist/
          git commit -m "chore(release): v$VERSION [skip ci]"x
          git tag "v$VERSION"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ env.VSIX_FILE }}
          path: ${{ env.VSIX_FILE }}
          if-no-files-found: error

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          npx vsce publish --packagePath "$VSIX_FILE" -p "$VSCE_PAT" --skip-duplicate

      - name: Publish to Open VSX
        env:
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
        run: npx ovsx publish "$VSIX_FILE" -p "$OPEN_VSX_TOKEN" --skip-duplicate

      - name: Push release commit and tag
        run: git push origin main --follow-tags

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v$VERSION"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" "$VSIX_FILE" --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$tag" "$VSIX_FILE" \
              --title "$tag" \
              --notes-file "releases/$VERSION.md" \
              --repo "$GITHUB_REPOSITORY"
          fi

      - name: Verify published version
        env:
          EXTENSION_ID: drruvari.lumberjack-theme
          VERIFY_ATTEMPTS: "30"
          VERIFY_DELAY_MS: "20000"
        run: npm run verify:publish -- "$EXTENSION_ID" "$VERSION"
